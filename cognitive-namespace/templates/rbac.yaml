{{- if .Values.rbac.enabled -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccount.name | quote }}
  namespace: {{ .Values.namespace.name | quote }}
  {{- with .Values.rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-role" .Values.rbac.serviceAccount.name | quote }}
  namespace: {{ .Values.namespace.name | quote }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-binding" .Values.rbac.serviceAccount.name | quote }}
  namespace: {{ .Values.namespace.name | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccount.name | quote }}
    namespace: {{ .Values.namespace.name | quote }}
roleRef:
  kind: Role
  name: {{ printf "%s-role" .Values.rbac.serviceAccount.name | quote }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
